<!doctype html>
<html>
  <head>
    <title>Welcome Sudarshona</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        background: linear-gradient(135deg, #141414 0%, #2d0a1a 100%);
      }
    </style>
  </head>
  <body class="flex items-center justify-center h-screen">
    <div
      class="bg-black bg-opacity-80 p-10 rounded-2xl shadow-2xl w-96 border border-pink-900"
    >
      <h1 class="text-pink-500 text-3xl font-bold mb-8 text-center">
        Hello Suku! ❤️
      </h1>
      <form method="POST" class="space-y-6">
        <input
          type="text"
          name="username"
          placeholder="Username"
          class="w-full p-3 bg-gray-800 text-white rounded focus:outline-none border-b-2 border-transparent focus:border-pink-500"
        />
        <input
          type="password"
          name="password"
          placeholder="Password"
          class="w-full p-3 bg-gray-800 text-white rounded focus:outline-none border-b-2 border-transparent focus:border-pink-500"
        />
        <button
          class="w-full bg-pink-600 hover:bg-pink-700 text-white font-bold py-3 rounded transition duration-300"
        >
          Enter My World
        </button>
      </form>
      {% if error %}
      <p class="text-red-400 mt-4 text-sm text-center">{{ error }}</p>
      {% endif %}
    </div>
  </body>
</html>
